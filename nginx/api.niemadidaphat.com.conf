server {
    listen 80;
    server_name api.niemadidaphat.com;

    # Logs
    access_log /var/log/nginx/api.niemadidaphat.access.log;
    error_log /var/log/nginx/api.niemadidaphat.error.log;

    # Client max body size (cho upload lớn)
    client_max_body_size 100M;

    # Timeouts
    client_body_timeout 300s;
    client_header_timeout 300s;

    # Proxy to backend Node.js
    location / {
        proxy_pass http://localhost:5000;
        proxy_http_version 1.1;
        
        # WebSocket support
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection 'upgrade';
        
        # Headers
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        
        # Proxy settings
        proxy_cache_bypass $http_upgrade;
        proxy_buffering off;
        
        # Timeouts
        proxy_connect_timeout 300s;
        proxy_send_timeout 300s;
        proxy_read_timeout 300s;
    }

    # Health check endpoint - no logging
    location /health {
        proxy_pass http://localhost:5000/health;
        access_log off;
    }

    # Security headers
    add_header X-Frame-Options "SAMEORIGIN" always;
    add_header X-Content-Type-Options "nosniff" always;
    add_header X-XSS-Protection "1; mode=block" always;
}

# Redirect www to non-www (if needed)
server {
    listen 80;
    server_name www.api.niemadidaphat.com;
    return 301 https://api.niemadidaphat.com$request_uri;
}
